---
name: End-to-End Tests

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Containerized end-to-end tests (${{ matrix.package_manager }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_manager: apt
            make_target: test-e2e-apt
          - package_manager: apk
            make_target: test-e2e-apk
          - package_manager: dnf
            make_target: test-e2e-dnf

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build project artifact
        run: make all

      - name: Run containerized end-to-end tests
        run: make ${{ matrix.make_target }}
